# Builds the moos-ivp Debian/Ubuntu packages and publishes them to the
# "openocean-build" S3 bucket (us-east-1) via aptly.
#
# Triggered whenever moos-ivp/debian/changelog changes (i.e. a new release
# is cut), but gated behind manual approval: both jobs target the "release"
# GitHub Environment, which must be configured (Settings -> Environments)
# with a required reviewer so the workflow pauses for human sign-off before
# any build or publish step runs. That environment must also define the
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets aptly uses to talk to S3.
#
# Signing the built packages (.dsc/.changes) is optional and controlled by
# the "release" Environment's secrets (Settings -> Environments -> release
# -> Environment secrets):
#   - GPG_PRIVATE_KEY (required to enable signing): an ASCII-armored GPG
#     private key, e.g. the output of
#       gpg --armor --export-secret-keys YOUR_KEY_ID
#     Leave this secret unset/undefined to keep building unsigned packages
#     (the previous/default behavior).
#   - GPG_PASSPHRASE (optional): the passphrase protecting the above key,
#     if any. If the key has no passphrase, leave this unset.
# When GPG_PRIVATE_KEY is set, the "Import GPG signing key" step below
# imports it and "make debian-sbuild" signs the resulting .dsc/.changes
# with it (see SIGN_KEY in the Makefile).
name: Build and publish moos-ivp packages

on:
  push:
    paths:
      - moos-ivp/debian/changelog
  workflow_dispatch: {}

permissions:
  contents: read

env:
  OOS_PACKAGE: moos-ivp

jobs:
  build:
    name: Build (${{ matrix.distro }}/${{ matrix.dist }}/${{ matrix.arch }})
    # Native arm64 runners (ubuntu-24.04-arm) avoid the need for QEMU
    # emulation when cross-building arm64 packages.
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    environment: release
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          # Debian: "oldstable"/"stable"
          - distro: debian
            dist: bookworm
          - distro: debian
            dist: trixie
          # Ubuntu: currently supported LTS series.
          - distro: ubuntu
            dist: jammy
          - distro: ubuntu
            dist: noble
          - distro: ubuntu
            dist: resolute
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends devscripts dpkg-dev gnupg

      - name: Import GPG signing key
        id: gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${GPG_PRIVATE_KEY}" ]; then
            echo "No GPG_PRIVATE_KEY secret configured on the 'release' Environment -- building unsigned packages."
            echo "sign_key=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -m 700 -p "${GNUPGHOME}"
          echo "GNUPGHOME=${GNUPGHOME}" >> "$GITHUB_ENV"

          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          key_id=$(gpg --list-secret-keys --with-colons | awk -F: '$1 == "sec" { print $5; exit }')
          if [ -z "${key_id}" ]; then
            echo "::error::Failed to import a usable secret key from GPG_PRIVATE_KEY -- check the secret's contents."
            exit 1
          fi
          echo "sign_key=${key_id}" >> "$GITHUB_OUTPUT"

          if [ -n "${GPG_PASSPHRASE:-}" ]; then
            # Cache the passphrase in gpg-agent so "debsign" (invoked
            # non-interactively by "make debian-sbuild" below) can unlock
            # the key without a terminal/pinentry prompt.
            echo "allow-preset-passphrase" > "${GNUPGHOME}/gpg-agent.conf"
            gpgconf --kill gpg-agent || true
            gpgconf --launch gpg-agent
            keygrip=$(gpg --list-secret-keys --with-keygrip --with-colons | awk -F: '$1 == "grp" { print $10; exit }')
            if [ -z "${keygrip}" ]; then
              echo "::error::Could not determine the keygrip for the imported key -- unable to cache GPG_PASSPHRASE."
              exit 1
            fi
            libexec_dir=$(gpgconf --list-dirs libexecdir)
            "${libexec_dir}/gpg-preset-passphrase" --preset "${keygrip}" <<< "${GPG_PASSPHRASE}"
          fi

      - name: Build packages (sbuild)
        run: make debian-sbuild DISTRO=${{ matrix.distro }} DIST=${{ matrix.dist }} ARCH=${{ matrix.arch }} SIGN_KEY=${{ steps.gpg.outputs.sign_key }}

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OOS_PACKAGE }}-${{ matrix.distro }}-${{ matrix.dist }}-${{ matrix.arch }}
          # Upload all but omit *.build log which has unsupported characters
          path: |
            build/${{ env.OOS_PACKAGE }}/${{ matrix.distro }}-${{ matrix.dist }}-sbuild/*
            !build/${{ env.OOS_PACKAGE }}/${{ matrix.distro }}-${{ matrix.dist }}-sbuild/*.build
          if-no-files-found: error

  publish:
    name: Publish to S3 (aptly)
    needs: build
    runs-on: ubuntu-latest
    environment: release
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install aptly
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly

      - name: Configure aptly for S3 publishing
        run: |
          mkdir -p "${HOME}/.aptly"
          cat > "${HOME}/.aptly.conf" <<CONF
          {
            "rootDir": "${HOME}/.aptly",
            "gpgDisableSign": true,
            "gpgDisableVerify": true,
            "S3PublishEndpoints": {
              "openocean-build": {
                "region": "us-east-1",
                "bucket": "openocean-build",
                "acl": "",
                "prefix": "apt/"
              }
            }
          }
          CONF
          # NOTE: signing is disabled because no GPG signing key is provisioned
          # yet. Once a signing key is added as a secret, import it here and
          # drop gpgDisableSign/-skip-signing below so published repos are
          # trusted by apt without [trusted=yes].

      - name: Create/update repos and publish to S3
        run: |
          set -euo pipefail
          for artifact_dir in artifacts/${OOS_PACKAGE}-*; do
            [ -d "${artifact_dir}" ] || continue
            name=$(basename "${artifact_dir}")
            # Artifact names are "${OOS_PACKAGE}-${distro}-${dist}-${arch}";
            # strip the arch suffix since amd64/arm64 builds of the same
            # distro/dist are published into the same (multi-arch) repo.
            distro_dist_arch=${name#"${OOS_PACKAGE}"-}
            arch=${distro_dist_arch##*-}
            distro_dist=${distro_dist_arch%-"${arch}"}
            distro=${distro_dist%%-*}
            dist=${distro_dist#*-}
            repo="${OOS_PACKAGE}-${distro}-${dist}"
            endpoint="s3:openocean-build:${distro}-${dist}"

            echo "::group::Publishing ${repo} (distribution=${dist}) to ${endpoint}"
            # Guard "repo create" so re-running this step (e.g. a re-run of a
            # failed job against the same local aptly database) doesn't abort
            # the loop just because the local repo was already created.
            if ! aptly repo show "${repo}" >/dev/null 2>&1; then
              aptly repo create -distribution="${dist}" -component=main "${repo}"
            fi
            aptly repo add "${repo}" "${artifact_dir}"

            # Each run starts from a fresh runner with an empty local aptly
            # database, so it never has a record of a previous publish --
            # "publish repo" (first publish) is always the right call here,
            # not "publish update" (which needs a prior local snapshot).
            # -force-overwrite lets it overwrite pool files already present
            # in the bucket from earlier runs (e.g. a re-triggered workflow)
            # without failing on checksum mismatches for identical content.
            aptly publish repo \
              -force-overwrite \
              -skip-signing \
              -distribution="${dist}" \
              "${repo}" \
              "${endpoint}"
            echo "::endgroup::"
          done
